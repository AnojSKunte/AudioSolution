version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: audio-solution-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - JWT_SECRET=dev-secret-key-change-in-production
      - DATABASE_URL=postgresql://audio_user:audio_password@postgres:5432/audio_solution
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    networks:
      - audio-solution-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: audio-solution-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_ENV=development
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    networks:
      - audio-solution-network
    restart: unless-stopped
    depends_on:
      - backend

  audio-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: audio-solution-agent
    environment:
      - API_URL=http://backend:5000
      - NODE_ENV=development
    volumes:
      - ./audio-agent:/app/audio-agent
      - /app/audio-agent/node_modules
    networks:
      - audio-solution-network
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: audio-solution-postgres
    environment:
      - POSTGRES_USER=audio_user
      - POSTGRES_PASSWORD=audio_password
      - POSTGRES_DB=audio_solution
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - audio-solution-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audio_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: audio-solution-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@audiosolution.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - audio-solution-network
    restart: unless-stopped

networks:
  audio-solution-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
